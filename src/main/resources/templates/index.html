<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>오늘의 타로</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: radial-gradient(circle at top, #1b1c3a, #050510);
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 15px;
            color: #ccc;
            margin-bottom: 40px;
            font-style: italic;
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 18px;
            align-items: center;
        }

        .menu a {
            width: 260px;
            padding: 14px 0;
            text-decoration: none;
            color: #ffd;
            border: 1px solid rgba(255, 215, 150, 0.5);
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            font-size: 16px;
            letter-spacing: 1px;
        }

        .menu a:hover {
            background: rgba(255, 215, 150, 0.15);
            transform: translateY(-2px);
            box-shadow: 0 0 12px rgba(255, 215, 150, 0.4);
        }

        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: #777;
        }
        /* 📱 모바일 대응 */
@media (max-width: 768px) {

    h1 {
        font-size: 30px;
    }

    .subtitle {
        font-size: 13px;
        margin-bottom: 30px;
    }

    .menu a {
        width: 90%;
        font-size: 15px;
        padding: 16px 0;
    }

    .container {
        width: 100%;
        padding: 0 16px;
    }
}

    </style>
</head>

<body>

<div class="container">

    <h1>🔮 오늘의 타로</h1>
    <div class="subtitle">
        오늘의 선택이 내일의 흐름을 만듭니다
    </div>

    <div class="menu">
        <a href="/draw">🌞 오늘의 타로 (1장)</a>
        <a href="/draw3?type=today">🌞 오늘의 3장 타로</a>
        <a href="/draw3?type=love">❤️ 연애운 3장 타로</a>
        <a href="/draw3?type=money">💰 금전운 3장 타로</a>
    </div>

    <div class="footer">
        © Tarot Project
    </div>

</div>

</body>
</html>
