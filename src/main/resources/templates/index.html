<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tarot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ✅ 공통 CSS -->
    <link rel="stylesheet" th:href="@{/css/tarot.css}">

    <!-- ✅ 메인 전용 스타일만 -->
    <style>
        h1 {
            text-align: center;
            margin: 80px 0 60px;
            font-weight: 600;
            letter-spacing: 2px;
        }

        .menu-wrap {
            display: flex;
            justify-content: center;
            gap: 32px;
            padding-bottom: 80px;
        }

        .menu-card {
            width: 260px;
            background: rgba(255,255,255,0.08);
            border-radius: 22px;
            padding: 26px;
            text-align: center;
            box-shadow: 0 18px 40px rgba(0,0,0,0.45);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .menu-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 26px 60px rgba(0,0,0,0.6);
        }

        .card-image {
            width: 100%;
            height: 340px;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 18px;
        }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .menu-card h3 {
            margin: 14px 0 10px;
            font-weight: 600;
        }

        .menu-card p {
            font-size: 14px;
            color: #d0d0ff;
            line-height: 1.6;
        }

        .menu-card a {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            border-radius: 999px;
            background: linear-gradient(90deg, #7c7cff, #b49cff);
            color: #1b1c3a;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .menu-wrap {
                flex-direction: column;
                align-items: center;
                gap: 40px;
            }
            .menu-card {
                width: 90%;
                max-width: 320px;
            }
            .card-image {
                height: 280px;
            }
        }
    </style>
</head>

<body>

<div th:replace="~{fragments/top :: top}"></div>

<h1>🔮 Tarot</h1>

<div class="menu-wrap">

    <div class="menu-card">
        <div class="card-image">
            <img src="/image/single.png">
        </div>
        <h3>오늘의 타로</h3>
        <p>오늘 하루의 흐름과<br>당신에게 필요한 메시지</p>
        <a href="/draw">카드 뽑기</a>
    </div>

    <div class="menu-card">
        <div class="card-image">
            <img src="/image/three.png">
        </div>
        <h3>3장 타로</h3>
        <p>과거·현재·미래의 흐름을<br>확인합니다</p>
        <a href="/draw3">카드 뽑기</a>
    </div>

    <div class="menu-card">
        <div class="card-image">
            <img src="/image/match.png">
        </div>
        <h3>궁합 타로</h3>
        <p>두 사람의 관계 흐름을<br>타로로 확인하세요</p>
        <a href="/match">궁합 보기</a>
    </div>

</div>

</body>
</html>
