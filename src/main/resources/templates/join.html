<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
    <link rel="stylesheet" th:href="@{/css/tarot.css}">
    <style>
        .form-container {
            width: 100%;
            max-width: 400px;
            margin: 100px auto;
            padding: 40px;
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            text-align: center;
        }
        .form-container h2 {
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #d0d0ff;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.2);
            color: white;
            box-sizing: border-box;
        }
        .btn-submit {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border-radius: 999px;
            background: linear-gradient(90deg, #7c7cff, #b49cff);
            color: #1b1c3a;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/top :: top}"></div>

<div class="form-container">
    <h2>회원가입</h2>
    <form action="/joinProc" method="post">
        <div class="form-group">
            <label for="username">아이디</label>
            <input type="text" id="username" name="username" required>
        </div>
        <div class="form-group">
            <label for="password">비밀번호</label>
            <input type="password" id="password" name="password" required>
        </div>
        <div class="form-group">
            <label for="name">이름</label>
            <input type="text" id="name" name="name" required>
        </div>
        <button type="submit" class="btn-submit">가입하기</button>
    </form>
</div>

</body>
</html>
