<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>궁합 타로</title>

    <!-- ✅ 공통 CSS 반드시 포함 -->
    <link rel="stylesheet" th:href="@{/css/tarot.css}">

    <!-- ✅ 페이지 전용 스타일만 여기 -->
    <style>
        .container {
            max-width: 420px;
            margin: 120px auto;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 36px 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.45);
        }

        .field {
            margin-bottom: 18px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #d6d6ff;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: none;
            outline: none;
            font-size: 14px;
            background: rgba(255,255,255,0.15);
            color: white;
        }

        input::placeholder {
            color: #c7c7e0;
        }

        .hint {
            font-size: 12px;
            color: #b8b8d9;
            margin-top: 6px;
        }

        button {
            width: 100%;
            margin-top: 24px;
            padding: 14px;
            border-radius: 999px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(90deg, #7c7cff, #b49cff);
            color: #1b1c3a;
        }
    </style>
</head>

<body>

<!-- ✅ 네비 -->
<div th:replace="~{fragments/top :: top}"></div>

<div class="container">
    <h2 class="tarot-title">💞 궁합 타로</h2>

    <form action="/match/result" method="get">
        <div class="field">
            <label>본인 성함</label>
            <input type="text" name="nameA" placeholder="예: 나" required>
        </div>

        <div class="field">
            <label>상대  성함</label>
            <input type="text" name="nameB" placeholder="예: 그 사람" required>
        </div>

        <div class="field">
            <label>궁금한 점 (선택)</label>
            <input type="text" name="question"
                   placeholder="예: 앞으로 잘 될 수 있을까요?">
            <div class="hint">질문은 입력하지 않아도 괜찮아요 🌙</div>
        </div>

        <button type="submit">카드 뽑기 🔮</button>
    </form>
</div>

</body>
</html>
