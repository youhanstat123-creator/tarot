<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>궁합 타로</title>

    <style>
        body {
            font-family: "Pretendard", "Noto Sans KR", sans-serif;
            background: linear-gradient(180deg, #0f1021, #1b1c3a);
            color: #f5f5f7;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 420px;
            margin: 120px auto;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 36px 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.45);
        }

        h2 {
            text-align: center;
            margin-bottom: 28px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .field {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #d6d6ff;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: none;
            outline: none;
            font-size: 14px;
            background: rgba(255,255,255,0.15);
            color: white;
        }

        input::placeholder {
            color: #c7c7e0;
        }

        .hint {
            font-size: 12px;
            color: #b8b8d9;
            margin-top: 6px;
        }

        button {
            width: 100%;
            margin-top: 24px;
            padding: 14px;
            border-radius: 999px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(90deg, #7c7cff, #b49cff);
            color: #1b1c3a;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 24px rgba(180,156,255,0.5);
        }
    </style>
</head>

<body>

<div class="container">
    <h2>💞 궁합 타로</h2>

    <form action="/match/result" method="get">


    <div class="field">
            <label>상대 A 이름</label>
            <input type="text" name="nameA" placeholder="예: 나" required>
        </div>

        <div class="field">
            <label>상대 B 이름</label>
            <input type="text" name="nameB" placeholder="예: 그 사람" required>
        </div>

        <div class="field">
            <label>궁금한 점 (선택)</label>
            <input type="text" name="question"
                   placeholder="예: 앞으로 잘 될 수 있을까요?">
            <div class="hint">
                질문은 입력하지 않아도 괜찮아요 🌙
            </div>
        </div>

        <button type="submit">
            카드 뽑기 🔮
        </button>
    </form>
</div>

</body>
</html>
