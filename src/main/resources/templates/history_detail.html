<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>타로 기록 상세</title>
    <link rel="stylesheet" th:href="@{/css/tarot.css}">

</head>
<body>
<div th:replace="~{fragments/top :: top}"></div>

<div class="detail-wrap">

    <div class="detail-card">

        <h2>🔮 타로 기록 상세</h2>

        <div class="detail-item">
            <span class="label">질문</span>
            <p th:text="${history.question}"></p>
        </div>

        <div class="detail-item">
            <span class="label">타입</span>
            <p th:text="${history.type}"></p>
        </div>

        <div class="detail-item">
            <span class="label">뽑은 카드</span>
            <p th:text="${history.cardNames}"></p>
        </div>

        <div class="detail-item">
            <span class="label">해석</span>
            <p th:text="${history.summary}"></p>
        </div>

        <div class="detail-item">
            <span class="label">날짜</span>
            <p th:text="${#temporals.format(history.createdAt, 'yyyy-MM-dd HH:mm')}"></p>
        </div>

        <a href="/history" class="back-btn">← 목록으로 돌아가기</a>

    </div>

</div>
