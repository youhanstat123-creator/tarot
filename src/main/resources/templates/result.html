<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>1장 타로</title>
    <link rel="stylesheet" th:href="@{/css/tarot.css}">

</head>
<body>
<div th:replace="~{fragments/top :: top}"></div>
<h2 class="tarot-title">카드를 눌러주세요 🔮</h2>
<form action="/draw" method="post" style="text-align:center; margin-bottom:30px;">
    <input type="text" name="question"
           th:value="${question}"
           placeholder="질문을 입력하세요 ✨"
           style="padding:10px; width:250px; border-radius:8px; border:none;">
    <button type="submit"
            style="padding:10px 20px; border-radius:8px; margin-left:10px;">
        카드 뽑기
    </button>
</form>
<p th:if="${question}"
   style="text-align:center; margin-bottom:20px; color:#cfcfff;">
    Q. <span th:text="${question}"></span>
</p>
<div class="cards">
    <div class="tarot-box" onclick="this.classList.toggle('flip')">

        <div class="card">
            <div class="card-face card-back">
                <img src="/image/back.png">
            </div>

            <div class="card-face card-front">
                <img th:src="@{/image/{img}(img=${tarotCard.image})}">
            </div>
        </div>

        <div class="card-text">
            <div class="card-name" th:text="${tarotCard.name}"></div>
            <p class="card-explanation" th:text="${explanation}"></p>
        </div>

    </div>
</div>

<div class="buttons">
    <a href="/draw">🔄 다시 뽑기</a>
    <a href="/">🏠 처음으로</a>
</div>

</body>
</html>
